apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: medium-fast
  namespace: medium-fast
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/class: "kpa.autoscaling.knative.dev"
        autoscaling.knative.dev/metric: "concurrency"
        autoscaling.knative.dev/target: "1"
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "41"
        autoscaling.knative.dev/window: "5m"
        # autoscaling.knative.dev/scale-down-delay: "5m"
        autoscaling.knative.dev/target-burst-capacity: "-1"
        autoscaling.knative.dev/initial-scale: "0"
    spec:
      containerConcurrency: 1
      containers:
      - image: ghcr.io/titi622/medium-fast:v1
        env:
        - name: COLD_SLEEP_SEC
          value: "0.5"
        ports:
        - containerPort: 8090
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8090
        livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "1"
            memory: "256Mi"
